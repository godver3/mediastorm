      }).catch(() => null);
    }

    function buildProgressPayload(position, duration, isPaused, isBuffering) {
      const externalIds = {};
      if (playbackMeta.imdbId) externalIds.imdb = playbackMeta.imdbId;
      if (playbackMeta.tmdbId) externalIds.tmdb = String(playbackMeta.tmdbId);
      if (playbackMeta.tvdbId) externalIds.tvdb = String(playbackMeta.tvdbId);
      if (playbackMeta.itemId) externalIds.titleId = String(playbackMeta.itemId);
      if (playbackMeta.isLive) {
        if (routeParam('tvgId')) externalIds.tvgId = routeParam('tvgId');
        if (routeParam('liveSourceUrl')) externalIds.liveSourceUrl = routeParam('liveSourceUrl');
      }

      const payload = {
        mediaType: playbackMeta.mediaType || 'movie',
        itemId: buildProgressItemId(),
        position,
        duration,
        isPaused: Boolean(isPaused),
        isBuffering: Boolean(isBuffering),
        timestamp: new Date().toISOString(),
        externalIds,
        year: playbackMeta.year || undefined,
      };
      if (payload.mediaType === 'episode') {
        payload.seasonNumber = playbackMeta.seasonNumber || undefined;
        payload.episodeNumber = playbackMeta.episodeNumber || undefined;
        payload.seriesId = playbackMeta.itemId || undefined;
        payload.seriesName = playbackMeta.seriesTitle || playbackMeta.title || undefined;
        payload.episodeName = playbackMeta.episodeName || undefined;
      } else {
        payload.movieName = playbackMeta.title || undefined;
      }
      return payload;
    }

    function buildProgressItemId() {
      if (playbackMeta.mediaType === 'live') return playbackMeta.itemId || routeParam('liveSourceUrl') || directMovieUrl || playbackMeta.title || 'live-channel';
      if (playbackMeta.mediaType !== 'episode') return playbackMeta.itemId || sourcePath || directMovieUrl || playbackMeta.title || 'movie';
      const seriesId = playbackMeta.itemId || playbackMeta.seriesTitle || playbackMeta.title || 'series';
      const season = playbackMeta.seasonNumber || 1;
      const episode = playbackMeta.episodeNumber || 1;
      return `${seriesId}:S${String(season).padStart(2, '0')}E${String(episode).padStart(2, '0')}`;
    }

    function stopHlsSession(options = {}) {
      sendWebPlayerProgress({ force: true, keepalive: Boolean(options.keepalive), isPaused: true });
      stopProgressTracking();
      if (keepaliveTimer) {
        clearInterval(keepaliveTimer);
        keepaliveTimer = null;
      }
      if (webPlayerSubtitleRefreshTimer) {
        clearTimeout(webPlayerSubtitleRefreshTimer);
        webPlayerSubtitleRefreshTimer = null;
      }
      const video = document.getElementById('webPlayer');
      if (video) {
        try {
          video.pause();
          video.removeAttribute('src');
          video.load();
        } catch {}
      }
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
      if (hlsSessionId) {
        const id = hlsSessionId;
        hlsSessionId = '';
        fetch(apiUrl(`/video/hls/${encodeURIComponent(id)}/stop`), {
          method: 'POST',
          credentials: 'same-origin',
          keepalive: Boolean(options.keepalive),
        }).catch(() => {});
      }
    }

    async function apiCall(path, options = {}) {
      const response = await fetch(apiUrl(path), {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `HTTP ${response.status}`);
      }
      const contentType = response.headers.get('content-type') || '';
      if (!contentType.includes('application/json')) return null;
      return response.json();
    }

    function webPlayerDebugLog(level, message, details = {}) {
      // The /debug/log endpoint is outside a share session's stream-only scope.
      if (SHARE_MODE) return;
      try {
        const payload = {
          sessionId: webPlayerDebugSessionId,
          userAgent: navigator.userAgent,
          path: window.location.href,
          entries: [{
            level,
            message: `[web-player] ${message} ${JSON.stringify(details)}`,
            timestamp: new Date().toISOString(),
          }],
        };
        fetch(apiUrl('/debug/log'), {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          keepalive: true,
        }).catch(() => {});
      } catch {}
    }

    function redactUrlForLog(value) {
      if (!value) return '';
      try {
        const url = new URL(value, window.location.origin);
        if (url.searchParams.has('token')) url.searchParams.set('token', 'redacted');
        return url.toString();
      } catch {
        return String(value).replace(/([?&]token=)[^&]+/i, '$1redacted');
      }
    }

    function apiUrl(path) {
      const value = String(path || '');
      if (/^https?:\/\//i.test(value)) return value;
      const apiPrefix = AUTH_TOKEN ? `${SERVER_BASE_PATH}/api` : `${SERVER_BASE_PATH}/account/api`;
      if (value.startsWith(`${SERVER_BASE_PATH}/account/api/`)) return appendAuthToken(value);
      if (value.startsWith(`${SERVER_BASE_PATH}/api/`)) return appendAuthToken(value);
      if (value.startsWith('/account/api/')) return appendAuthToken(`${SERVER_BASE_PATH}${value}`);
      if (value.startsWith('/api/')) return appendAuthToken(`${SERVER_BASE_PATH}${value}`);
      if (value.startsWith('/video/') || value.startsWith('/live/')) return appendAuthToken(`${apiPrefix}${value}`);
      if (value.startsWith('/')) return appendAuthToken(`${apiPrefix}${value}`);
      return value;
    }

    function appendAuthToken(value) {
      if (!AUTH_TOKEN) return value;
      try {
        const url = new URL(value, window.location.origin);
        if (!url.searchParams.has('token')) url.searchParams.set('token', AUTH_TOKEN);
        return url.toString();
      } catch {
        const separator = value.includes('?') ? '&' : '?';
        return `${value}${separator}token=${encodeURIComponent(AUTH_TOKEN)}`;
      }
    }

    function sourcePathFromStreamUrl(value) {
      try {
        const parsed = new URL(value, window.location.origin);
        if (!parsed.pathname.endsWith('/video/stream')) return '';
        return decodeRouteValue(parsed.searchParams.get('path') || '');
      } catch {
        return '';
      }
    }

    function routeParam(name) {
      return decodeRouteValue(ROUTE_PARAMS.get(name) || '');
    }

    function numericRouteParam(name) {
      const parsed = Number(routeParam(name));
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function decodeRouteValue(value) {
      let decoded = String(value || '');
      for (let i = 0; i < 2; i++) {
        try {
          const next = decodeURIComponent(decoded);
          if (next === decoded) break;
          decoded = next;
        } catch {
          break;
        }
      }
      return decoded;
    }

    function parseOptionalInt(value) {
      const parsed = Number.parseInt(String(value || ''), 10);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function isWebTextSubtitleStream(stream) {
      const codec = String(stream?.codecName || stream?.codec || '').toLowerCase();
      return ['subrip', 'srt', 'ass', 'ssa', 'webvtt', 'vtt', 'mov_text', 'text'].includes(codec);
    }

    function formatTrackLabel(stream, fallback) {
      const index = Number(stream?.index);
      const language = String(stream?.language || '').trim();
      const title = String(stream?.title || '').trim();
      const codec = String(stream?.codecName || stream?.codec || '').trim();
      return [
        `${fallback} ${Number.isFinite(index) ? index : ''}`.trim(),
        language ? language.toUpperCase() : '',
        title,
        codec ? codec.toUpperCase() : '',
      ].filter(Boolean).join(' - ');
    }

    function formatTime(seconds) {
      const total = Math.max(0, Math.floor(Number(seconds) || 0));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      if (hours > 0) return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      return `${minutes}:${String(secs).padStart(2, '0')}`;
    }

    function formatDurationLabel(seconds) {
      const value = Number(seconds);
      return Number.isFinite(value) && value > 0 ? formatTime(value) : '--:--';
    }

    function setStatus(message, error) {
      const status = document.getElementById('status');
      if (!status) return;
      status.textContent = message || '';
      status.classList.toggle('error', Boolean(error));
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
