{{define "playback"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mediastorm player</title>
  <style>
    :root {
      --bg: #08090d;
      --panel: #0d0f15;
      --panel-2: #181b24;
      --border: rgba(255, 255, 255, 0.12);
      --text: #f4f7fb;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --danger: #f87171;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(79, 140, 255, 0.16), transparent 34rem),
        linear-gradient(180deg, #0b0d13 0%, #050609 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.8rem clamp(0.75rem, 2.5vw, 1.5rem);
      background: linear-gradient(180deg, rgba(5, 6, 9, 0.92), rgba(5, 6, 9, 0.62));
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 0.75rem;
    }

    .brand {
      display: grid;
      gap: 0.12rem;
      min-width: 0;
    }

    .brand-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shell {
      display: grid;
      gap: 0.8rem;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 0;
      height: 100%;
      width: min(1420px, calc(100vw - 1.5rem));
      margin: 0 auto;
      padding: clamp(0.5rem, 1.5vw, 1rem) 0 1.25rem;
      overflow: hidden;
    }

    .meta {
      display: grid;
      gap: 0.35rem;
      min-width: 0;
      padding: 0 clamp(0.15rem, 1vw, 0.75rem);
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .details {
      color: var(--muted);
      font-size: 0.92rem;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-panel {
      min-height: 0;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48);
    }

    #videoHost {
      position: relative;
      height: 100%;
      min-height: 0;
      padding: clamp(0.35rem, 1vw, 0.75rem);
      background: #000;
    }

    .video-frame {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9;
      max-height: none;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .subtitle-overlay {
      position: absolute;
      left: 5%;
      right: 5%;
      bottom: clamp(5.25rem, 12vh, 8rem);
      color: #fff;
      font-size: clamp(1rem, 2.5vw, 2rem);
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
      text-shadow: 0 2px 7px #000, 0 0 2px #000;
      white-space: pre-line;
      pointer-events: none;
    }

    .pause-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
    }

    #videoHost.is-paused .pause-overlay {
      opacity: 1;
    }

    .pause-chip {
      display: grid;
      place-items: center;
      width: 4rem;
      height: 4rem;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: white;
      backdrop-filter: blur(10px);
    }

    .pause-chip svg {
      width: 42%;
      height: 42%;
    }

    .controls {
      display: flex;
      gap: 0.55rem;
      align-items: center;
      position: absolute;
      left: clamp(0.75rem, 2.5vw, 1.6rem);
      right: clamp(0.75rem, 2.5vw, 1.6rem);
      bottom: clamp(0.75rem, 2.5vw, 1.6rem);
      z-index: 4;
      padding: 0.55rem;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(12, 14, 18, 0.78), rgba(0, 0, 0, 0.82));
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(18px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .track-backdrop {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: none;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(3px);
    }

    .track-controls {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      align-items: center;
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 7;
      width: min(420px, calc(100% - 2rem));
      max-height: min(520px, calc(100% - 2rem));
      padding: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: rgba(8, 10, 14, 0.96);
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(18px);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -48%) scale(0.98);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .track-controls label {
      display: flex;
      width: 100%;
      gap: 0.4rem;
      flex-direction: column;
      align-items: stretch;
      color: var(--muted);
      font-size: 0.82rem;
    }

    #videoHost.tracks-open .track-backdrop {
      display: block;
    }

    #videoHost.tracks-open .track-controls {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      min-height: 2.35rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      border-color: rgba(255, 255, 255, 0.24);
      background: #202431;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .icon-btn {
      width: 2.35rem;
      min-width: 2.35rem;
      padding: 0;
    }

    .back-btn {
      min-width: 0;
      padding: 0 0.8rem;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .topbar .back-btn {
      height: 2.35rem;
      min-height: 2.35rem;
    }

    .play-btn {
      width: 2.75rem;
      min-width: 2.75rem;
    }

    .icon {
      display: inline-flex;
      width: 1rem;
      height: 1rem;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .pause-icon,
    .fullscreen-exit,
    .theater-exit {
      display: none;
    }

    .play-btn.is-playing .play-icon {
      display: none;
    }

    .play-btn.is-playing .pause-icon {
      display: inline-flex;
    }

    #videoHost.is-fullscreen .fullscreen-enter,
    #videoHost.is-theater .theater-enter {
      display: none;
    }

    #videoHost.is-fullscreen .fullscreen-exit,
    #videoHost.is-theater .theater-exit {
      display: inline-flex;
    }

    .seek {
      flex: 1;
      min-width: 0;
      accent-color: var(--accent);
    }
    .volume-slider {
      width: 84px;
      min-width: 84px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .time {
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Live playback: no seek bar, just a flexible spacer + LIVE badge. */
    .seek-spacer {
      flex: 1;
      min-width: 0;
    }

    .time.live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .live-dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #ff3b30;
      box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
      animation: live-pulse 2s infinite;
    }

    @keyframes live-pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.6); }
      70% { box-shadow: 0 0 0 0.5rem rgba(255, 59, 48, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }

    .select {
      width: 100%;
      max-width: min(330px, 76vw);
      padding: 0.42rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
    }

    .status {
      position: absolute;
      left: clamp(0.75rem, 2.5vw, 1.6rem);
      right: clamp(0.75rem, 2.5vw, 1.6rem);
      bottom: calc(clamp(0.75rem, 2.5vw, 1.6rem) + 3.75rem);
      z-index: 4;
      min-height: 1.2rem;
      color: var(--muted);
      font-size: 0.85rem;
      pointer-events: none;
    }

    .status.error {
      color: var(--danger);
    }

    .empty {
      padding: 1.5rem;
      color: var(--muted);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .spinner {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.16);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .manual {
      display: none;
      gap: 0.6rem;
      align-items: center;
      padding: 0.85rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .manual.is-visible {
      display: flex;
    }

    .manual input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
    }

    #videoHost.is-theater {
      position: fixed;
      inset: clamp(0.5rem, 2vw, 1rem);
      z-index: 80;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto auto;
      max-height: calc(100vh - 2rem);
      background: #000;
      border-radius: var(--radius);
      overflow: auto;
    }

    #videoHost.is-theater .video-frame {
      max-height: none;
      height: 100%;
    }

    #videoHost.is-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      padding: 0;
      background: #000;
      overflow: hidden;
    }

    #videoHost.is-fullscreen .video-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      max-height: none;
      aspect-ratio: auto;
      border-radius: 0;
    }

    #videoHost.controls-hidden .controls,
    #videoHost.controls-hidden .player-back {
      opacity: 0;
      pointer-events: none;
      transform: translateY(0.4rem);
    }

    /* Visibility helpers — mobile vs desktop player chrome. */
    .mobile-only {
      display: none;
    }

    /* Top-left in-video back button (mobile immersive view). */
    .player-back {
      position: absolute;
      top: calc(0.75rem + env(safe-area-inset-top));
      left: calc(0.75rem + env(safe-area-inset-left));
      z-index: 6;
      background: rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
    }

    .track-sheet-header {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      font-weight: 600;
    }

    @media (max-width: 760px) {
      /* Mobile is immersive-only: hide the page chrome and make the player fill
         the viewport from the very first paint (loading state included), so the
         non-fullscreen page never flashes before the shell renders. */
      html,
      body {
        overflow: hidden;
      }

      .topbar,
      .meta,
      #manualStart {
        display: none;
      }

      .shell,
      .player-panel {
        padding: 0;
        margin: 0;
      }

      #videoHost {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        background: #000;
      }

      /* Cluster the transport buttons on the left; push the tracks button right.
         Seek + time wrap onto their own full-width rows below. */
      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .controls .icon-btn {
        flex: 0 0 auto;
      }

      .controls .tracks-btn {
        margin-left: auto;
      }

      .seek {
        flex: 1 1 100%;
        order: 5;
      }

      .time {
        flex: 0 0 100%;
        order: 6;
      }

      .back-btn .back-label {
        display: none;
      }

      /* Mobile player chrome: immersive only — no theater/fullscreen/desktop back,
         track selectors live in a bottom sheet opened from the tracks button. */
      .desktop-only {
        display: none !important;
      }

      .mobile-only {
        display: inline-flex;
      }

      /* Audio/subtitle selectors as a bottom sheet, hidden until the tracks
         button toggles `.tracks-open` on the host. */
      .track-backdrop {
        z-index: 6;
      }

      .track-controls {
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        max-width: none;
        width: auto;
        max-height: min(70vh, 520px);
        flex-direction: column;
        align-items: stretch;
        gap: 0.85rem;
        padding: 1rem 1rem calc(1rem + env(safe-area-inset-bottom));
        border-radius: 16px 16px 0 0;
        background: rgba(8, 10, 14, 0.94);
        transform: translateY(110%);
        opacity: 1;
        pointer-events: auto;
        transition: transform 0.22s ease;
      }

      .track-controls label {
        flex-direction: column;
        align-items: stretch;
        gap: 0.35rem;
        font-size: 0.95rem;
      }

      .track-controls .select {
        max-width: none;
        width: 100%;
        padding: 0.7rem 0.6rem;
      }

      #videoHost.tracks-open .track-controls {
        transform: translateY(0);
      }

      /* The shared controls-hidden rule must not reveal or fade the sheet —
         its visibility is driven solely by `.tracks-open`. */
      #videoHost.controls-hidden .track-controls {
        transform: translateY(110%);
        opacity: 1;
        pointer-events: none;
      }

      #videoHost.controls-hidden.tracks-open .track-controls {
        transform: translateY(0);
        pointer-events: auto;
      }

      .manual {
        align-items: stretch;
        flex-direction: column;
      }
    }

    /* Share mode: a player-only view with no navigation back to the app. */
    body.share-mode .back-btn,
    body.share-mode .nav-back,
    body.share-mode .share-btn { display: none !important; }

    /* Share link dialog */
    .share-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 6, 10, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1200;
      padding: 20px;
    }
    .share-backdrop.is-open { display: flex; }
    .share-dialog {
      width: 100%;
      max-width: 440px;
      background: #141821;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
    }
    .share-dialog h2 { margin: 0 0 6px; font-size: 18px; }
    .share-dialog p { margin: 0 0 16px; font-size: 13px; line-height: 1.5; opacity: 0.7; }
    .share-row { display: flex; gap: 8px; }
    .share-row input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #0c0f16;
      color: #e7eaf0;
      font-size: 13px;
    }
    .share-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .share-status { font-size: 12px; opacity: 0.7; margin-top: 12px; min-height: 16px; }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn back-btn" type="button" onclick="goBackToWatch()" aria-label="Back to details" title="Back to details">
          <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></span>
          <span class="back-label">Back</span>
        </button>
        <div class="brand">
          <div class="brand-title">mediastorm</div>
          <div id="topSubtitle" class="brand-subtitle">Web player</div>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="meta">
        <div id="mediaTypeLabel" class="eyebrow">Playback</div>
        <h1 id="title">Loading player</h1>
        <div id="details" class="details"></div>
      </section>

      <section class="player-panel">
        <div id="videoHost">
          <div class="empty"><div class="spinner" role="status" aria-label="Loading"></div><span>Preparing player...</span></div>
        </div>
      </section>

      <section id="manualStart" class="manual">
        <input id="manualPath" type="text" placeholder="Paste a WebDAV path or stream URL">
        <button class="btn btn-primary" type="button" onclick="startManualPath()">Play</button>
      </section>
    </main>
  </div>

  <div id="shareBackdrop" class="share-backdrop" onclick="if(event.target===this)closeShareDialog()">
    <div class="share-dialog" role="dialog" aria-modal="true" aria-label="Share this stream">
      <h2>Share this stream</h2>
      <p>Anyone with this link can watch this title once — no account needed. The link opens straight into the player, works one time, and expires in 24 hours.</p>
      <div class="share-row">
        <input id="shareLinkInput" type="text" readonly onclick="this.select()">
        <button class="btn btn-primary" type="button" onclick="copyShareLink()">Copy</button>
      </div>
      <div id="shareStatus" class="share-status"></div>
      <div class="share-actions">
        <button class="btn" type="button" onclick="closeShareDialog()">Done</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script>
    const SERVER_BASE_PATH = {{json .ServerBasePath}};
    const RAW_PROFILES = {{json .Users}};
    const PROFILES = Array.isArray(RAW_PROFILES) ? RAW_PROFILES : [];
    const ROUTE_PARAMS = new URLSearchParams(window.location.search || '');
    const AUTH_TOKEN = routeParam('token');
    // Share mode: the page was opened from a one-time share link. Hide navigation
    // affordances (no back buttons / no share button) and do not write playback
    // progress back to the sharer's history.
    const SHARE_MODE = routeParam('shareMode') === '1' || routeParam('shareMode') === 'true';
    const WEB_PLAYER_PROGRESS_INTERVAL_MS = 10000;
    const WEB_PLAYER_PROGRESS_MIN_DELTA_SECONDS = 5;

    let activeProfileId = '';
    let activeProfileName = '';
    let playbackMeta = {};
    let sourcePath = '';
    let directMovieUrl = '';
    let hlsInstance = null;
    let hlsSessionId = '';
    let hlsPlaybackOffset = 0;
    let hlsDuration = 0;
    let hlsPlaylistUrl = '';
    let webPlayerActualStartOffset = 0;
    let webPlayerSubtitleStartOffset = null;
    let webPlayerSubtitleTimeOffset = 0;
    let webPlayerSeekInProgress = false;
    let webPlayerSeekInputActive = false;
    let webPlayerDisplayedSeekTarget = null;
    let webPlayerQueuedSeekTarget = null;
    let webPlayerAudioStreams = [];
    let webPlayerSubtitleStreams = [];
    let webPlayerSelectedAudioTrack = parseOptionalInt(routeParam('preselectedAudioTrack'));
    let webPlayerSelectedSubtitleTrack = parseOptionalInt(routeParam('preselectedSubtitleTrack'));
    if (webPlayerSelectedSubtitleTrack === null) webPlayerSelectedSubtitleTrack = -1;
    let webPlayerSubtitleCues = [];
    let webPlayerSubtitleLoadToken = 0;
    let webPlayerSubtitleRefreshTimer = null;
    let webPlayerControlsHideTimer = null;
    let webPlayerMediaRecoverAttempts = 0;
    let webPlayerVolume = 1;
    let webPlayerMuted = false;
    let webPlayerAutoMutedPendingGesture = false;
    let webPlayerDebugSessionId = `web-player-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    let keepaliveTimer = null;
    let progressTimer = null;
    let lastProgressSentAt = 0;
    let lastProgressPosition = 0;
    let lastKnownPositivePosition = 0;
    let lastProgressPaused = false;
    let lastProgressBuffering = false;
    let webPlayerBuffering = false;
    let progressCompleted = false;
    let liveWatchStartedAt = null;

    document.addEventListener('DOMContentLoaded', safeInit);
    window.addEventListener('beforeunload', () => {
      sendWebPlayerProgress({ force: true, keepalive: true, isPaused: true });
      stopHlsSession({ keepalive: true });
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeShareDialog();
        closeTrackSheet();
        setFullscreen(false);
        setTheater(false);
      }
      if (event.key === ' ' && document.activeElement?.tagName !== 'INPUT') {
        event.preventDefault();
        togglePlayback();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      const host = document.getElementById('videoHost');
      if (host && document.fullscreenElement !== host && host.classList.contains('is-fullscreen')) {
        setFullscreen(false);
      }
    });

    function safeInit() {
      try {
        init();
      } catch (error) {
        console.error('[web-player] init failed', error);
        renderLoading(`Player initialization failed: ${error.message || String(error)}`, true);
        document.getElementById('manualStart')?.classList.add('is-visible');
      }
    }

    function init() {
      if (SHARE_MODE) document.body.classList.add('share-mode');
      setupActiveProfile();
      readRouteMetadata();
      renderHeader();
      console.info('[web-player] init', {
        hasSourcePath: Boolean(sourcePath),
        hasDirectMovieUrl: Boolean(directMovieUrl),
        hasHlsSessionId: Boolean(hlsSessionId),
        hasToken: Boolean(AUTH_TOKEN),
        activeProfileId,
        mediaType: playbackMeta.mediaType,
      });
      webPlayerDebugLog('info', 'init', {
        hasSourcePath: Boolean(sourcePath),
        hasDirectMovieUrl: Boolean(directMovieUrl),
        hasHlsSessionId: Boolean(hlsSessionId),
        hasToken: Boolean(AUTH_TOKEN),
        activeProfileId,
        mediaType: playbackMeta.mediaType,
        isLive: Boolean(playbackMeta.isLive),
      });

      if (!activeProfileId) {
        renderLoading('No profile was provided for playback.', true);
        document.getElementById('manualStart').classList.add('is-visible');
        return;
      }

      if (sourcePath) {
        startWebPlayerFromSource({ startOffset: numericRouteParam('startOffset'), startPercent: numericRouteParam('startPercent') });
      } else if (hlsSessionId && directMovieUrl) {
        const requestedOffset = numericRouteParam('startOffset') || numericRouteParam('actualStartOffset') || 0;
        const actualOffset = numericRouteParam('actualStartOffset') || requestedOffset;
        syncSubtitleOffset(requestedOffset, actualOffset);
        hlsDuration = numericRouteParam('durationHint') || 0;
        renderPlayerShell();
        const playlistUrl = apiUrl(directMovieUrl);
        webPlayerDebugLog('info', 'attach existing hls session', {
          hlsSessionId,
          isLive: Boolean(playbackMeta.isLive),
          playlistUrl: redactUrlForLog(playlistUrl),
        });
        attachWebPlayer(document.getElementById('webPlayer'), playlistUrl);
        startKeepalive();
        startProgressTracking();
      } else if (directMovieUrl) {
        hlsDuration = numericRouteParam('durationHint') || 0;
        renderPlayerShell();
        const playlistUrl = apiUrl(directMovieUrl);
        webPlayerDebugLog('info', 'attach direct movie url', {
          isLive: Boolean(playbackMeta.isLive),
          playlistUrl: redactUrlForLog(playlistUrl),
        });
        attachWebPlayer(document.getElementById('webPlayer'), playlistUrl);
        startProgressTracking();
      } else {
        renderLoading('No playback source was provided.', true);
        document.getElementById('manualStart').classList.add('is-visible');
      }
    }

    function goBackToWatch() {
      sendWebPlayerProgress({ force: true, keepalive: true, isPaused: true });
      stopHlsSession({ keepalive: true });

      try {
        const referrer = document.referrer ? new URL(document.referrer) : null;
        if (referrer && referrer.origin === window.location.origin && window.history.length > 1) {
          window.history.back();
          return;
        }
      } catch {}

      const watchIndex = window.location.pathname.indexOf('/watch');
      const basePath = watchIndex >= 0 ? window.location.pathname.slice(0, watchIndex) : SERVER_BASE_PATH;
      window.location.assign(`${basePath || ''}/watch`);
    }

    // ---- One-time share link ----------------------------------------------
    function buildShareParams() {
      const params = {
        mediaType: playbackMeta.mediaType || 'movie',
        title: playbackMeta.title || '',
      };
      if (sourcePath) params.sourcePath = sourcePath;
      if (activeProfileId) params.profileId = activeProfileId;
      if (activeProfileName) params.profileName = activeProfileName;
      if (playbackMeta.seriesTitle) params.seriesTitle = playbackMeta.seriesTitle;
      if (playbackMeta.displayName) params.displayName = playbackMeta.displayName;
      if (playbackMeta.year) params.year = String(playbackMeta.year);
      if (playbackMeta.seasonNumber) params.seasonNumber = String(playbackMeta.seasonNumber);
      if (playbackMeta.episodeNumber) params.episodeNumber = String(playbackMeta.episodeNumber);
      if (playbackMeta.episodeName) params.episodeName = playbackMeta.episodeName;
      if (playbackMeta.imdbId) params.imdbId = playbackMeta.imdbId;
      if (playbackMeta.tvdbId) params.tvdbId = String(playbackMeta.tvdbId);
      if (playbackMeta.tmdbId) params.tmdbId = String(playbackMeta.tmdbId);
      if (playbackMeta.posterUrl) params.headerImage = playbackMeta.posterUrl;
      if (playbackMeta.dv) params.dv = '1';
      if (playbackMeta.hdr10) params.hdr10 = '1';
      if (playbackMeta.dvProfile) params.dvProfile = playbackMeta.dvProfile;
      if (playbackMeta.forceAAC) params.forceAAC = '1';

      // Capture the recipient's starting tracks from the current selection.
      if (Number(webPlayerSelectedAudioTrack) >= 0) params.preselectedAudioTrack = String(webPlayerSelectedAudioTrack);
      if (Number(webPlayerSelectedSubtitleTrack) >= 0) params.preselectedSubtitleTrack = String(webPlayerSelectedSubtitleTrack);

      // Start the recipient where the sharer currently is.
      const video = document.getElementById('webPlayer');
      const offset = Number(hlsPlaybackOffset || 0) + (video && Number.isFinite(video.currentTime) ? video.currentTime : 0);
      if (Number.isFinite(offset) && offset > 1) params.startOffset = offset.toFixed(2);
      return params;
    }

    async function openShareDialog() {
      const backdrop = document.getElementById('shareBackdrop');
      const input = document.getElementById('shareLinkInput');
      const status = document.getElementById('shareStatus');
      if (!backdrop || !input) return;
      input.value = '';
      if (status) status.textContent = 'Creating link…';
      backdrop.classList.add('is-open');

      try {
        const result = await apiCall('/share/create', {
          method: 'POST',
          body: JSON.stringify(buildShareParams()),
        });
        const absolute = new URL(result.url, window.location.origin).toString();
        input.value = absolute;
        input.select();
        if (status) status.textContent = 'Link ready — single use, expires in 24 hours.';
      } catch (error) {
        if (status) status.textContent = `Could not create link: ${error.message || String(error)}`;
      }
    }

    function closeShareDialog() {
      document.getElementById('shareBackdrop')?.classList.remove('is-open');
    }

    async function copyShareLink() {
      const input = document.getElementById('shareLinkInput');
      const status = document.getElementById('shareStatus');
      if (!input || !input.value) return;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(input.value);
        } else {
          input.select();
          document.execCommand('copy');
        }
        if (status) status.textContent = 'Copied to clipboard.';
      } catch {
        input.select();
        if (status) status.textContent = 'Press ⌘/Ctrl+C to copy.';
      }
    }

    function setupActiveProfile() {
      const requestedProfile = routeParam('profileId') || routeParam('userId');
      const selected = PROFILES.find((profile) => profile.id === requestedProfile) || PROFILES[0];
      if (selected) {
        activeProfileId = selected.id;
        activeProfileName = selected.name || selected.id;
      } else if (requestedProfile) {
        activeProfileId = requestedProfile;
        activeProfileName = routeParam('profileName') || requestedProfile;
      }
    }

    function readRouteMetadata() {
      sourcePath = routeParam('sourcePath');
      directMovieUrl = routeParam('movie');
      hlsSessionId = routeParam('hlsSessionId');
      if (!sourcePath && directMovieUrl) {
        sourcePath = sourcePathFromStreamUrl(directMovieUrl);
      }

      const rawMediaType = (routeParam('mediaType') || 'movie').toLowerCase();
      const isLive = rawMediaType === 'channel' || rawMediaType === 'live';
      const mediaType = isLive ? 'live' : rawMediaType === 'episode' || rawMediaType === 'series' ? 'episode' : 'movie';
      const title = routeParam('title') || routeParam('seriesTitle') || routeParam('displayName') || 'Untitled';
      const itemId = isLive
        ? routeParam('tvgId') || routeParam('liveSourceUrl') || hlsSessionId || title
        : routeParam('titleId') || routeParam('imdbId') || routeParam('tvdbId') || sourcePath || directMovieUrl || title;

      playbackMeta = {
        mediaType,
        isLive,
        itemId,
        title,
        seriesTitle: routeParam('seriesTitle'),
        displayName: routeParam('displayName'),
        year: parseOptionalInt(routeParam('year')),
        seasonNumber: parseOptionalInt(routeParam('seasonNumber')),
        episodeNumber: parseOptionalInt(routeParam('episodeNumber')),
        episodeName: routeParam('episodeName'),
        imdbId: routeParam('imdbId'),
        tvdbId: routeParam('tvdbId'),
        tmdbId: routeParam('tmdbId'),
        posterUrl: routeParam('headerImage'),
        dv: routeParam('dv') === '1' || routeParam('dv') === 'true',
        hdr10: routeParam('hdr10') === '1' || routeParam('hdr10') === 'true',
        dvProfile: routeParam('dvProfile'),
        forceAAC: routeParam('forceAAC') === '1' || routeParam('forceAAC') === 'true',
      };
    }

    function renderHeader() {
      const title = playbackMeta.title || 'Untitled';
      const episode = playbackMeta.mediaType === 'episode'
        ? `S${String(playbackMeta.seasonNumber || 1).padStart(2, '0')}E${String(playbackMeta.episodeNumber || 1).padStart(2, '0')}`
        : '';
      document.getElementById('title').textContent = title;
      document.getElementById('mediaTypeLabel').textContent = playbackMeta.isLive
        ? 'Live'
        : playbackMeta.mediaType === 'episode' ? 'Episode' : 'Movie';
      document.getElementById('details').textContent = [episode, playbackMeta.episodeName, playbackMeta.displayName || sourcePath]
        .filter(Boolean)
        .join(' - ');
      document.getElementById('topSubtitle').textContent = SHARE_MODE
        ? 'Shared stream'
        : activeProfileName ? `Playing as ${activeProfileName}` : 'Web player';
    }

    async function startManualPath() {
      const value = document.getElementById('manualPath').value.trim();
      if (!value) return;
      sourcePath = value;
      directMovieUrl = '';
      await startWebPlayerFromSource({ startOffset: 0 });
    }

    async function startWebPlayerFromSource(options = {}) {
      if (!sourcePath) {
        renderLoading('No playback source was provided.', true);
        document.getElementById('manualStart')?.classList.add('is-visible');
        return;
      }
      if (!activeProfileId) {
        renderLoading('No profile was provided for playback.', true);
        document.getElementById('manualStart')?.classList.add('is-visible');
        return;
      }
      stopHlsSession();
      renderLoading('Starting HLS session...');

      try {
        await loadTrackMetadata();
        const session = await createHlsSession(options);
        hlsSessionId = session.sessionId || '';
        const requestedOffset = Number(session.startOffset ?? options.startOffset ?? 0);
        const actualOffset = Number(session.actualStartOffset ?? requestedOffset);
        syncSubtitleOffset(requestedOffset, actualOffset);
        hlsDuration = Number(session.duration || hlsDuration || numericRouteParam('durationHint') || 0);
        hlsPlaylistUrl = apiUrl(session.playlistUrl || '');
        webPlayerDebugLog('info', 'created hls session', {
          hlsSessionId,
          isLive: Boolean(playbackMeta.isLive),
          playlistUrl: redactUrlForLog(hlsPlaylistUrl),
          duration: hlsDuration,
          requestedOffset,
          actualOffset,
        });

        renderPlayerShell();
        attachWebPlayer(document.getElementById('webPlayer'), hlsPlaylistUrl);
        startKeepalive();
        startProgressTracking();
      } catch (error) {
        renderLoading(`Web player failed: ${error.message || String(error)}`, true);
      }
    }

    async function loadTrackMetadata() {
      webPlayerAudioStreams = [];
      webPlayerSubtitleStreams = [];
      try {
        const params = new URLSearchParams({ path: sourcePath, profileId: activeProfileId });
        const metadata = await apiCall(`/video/metadata?${params.toString()}`);
        webPlayerAudioStreams = Array.isArray(metadata?.audioStreams) ? metadata.audioStreams : [];
        webPlayerSubtitleStreams = Array.isArray(metadata?.subtitleStreams)
          ? metadata.subtitleStreams.filter(isWebTextSubtitleStream)
          : [];
        if (webPlayerSelectedAudioTrack === null && webPlayerAudioStreams.length) {
          webPlayerSelectedAudioTrack = Number(webPlayerAudioStreams[0].index);
        }
      } catch (error) {
        console.warn('Failed to load track metadata:', error);
      }
    }

    async function createHlsSession(options = {}) {
      const params = new URLSearchParams({
        path: sourcePath,
        forceAAC: playbackMeta.forceAAC ? 'true' : 'true',
        target: 'web',
        profileId: activeProfileId,
        profileName: activeProfileName,
        mediaType: playbackMeta.mediaType || 'movie',
        title: playbackMeta.title || '',
        itemId: playbackMeta.itemId || '',
        startOffset: String(Math.max(0, Number(options.startOffset || 0)).toFixed(2)),
      });

      if (!options.startOffset && Number(options.startPercent) > 0) params.set('startPercent', String(options.startPercent));
      if (playbackMeta.dv) params.set('dv', 'true');
      if (playbackMeta.hdr10) params.set('hdr', 'true');
      if (playbackMeta.dvProfile) params.set('dvProfile', playbackMeta.dvProfile);
      if (Number(webPlayerSelectedAudioTrack) >= 0) params.set('audioTrack', String(webPlayerSelectedAudioTrack));
      if (Number(webPlayerSelectedSubtitleTrack) >= 0) params.set('subtitleTrack', String(webPlayerSelectedSubtitleTrack));
      if (playbackMeta.year) params.set('year', String(playbackMeta.year));
      if (playbackMeta.imdbId) params.set('imdb', playbackMeta.imdbId);
      if (playbackMeta.tmdbId) params.set('tmdb', playbackMeta.tmdbId);
      if (playbackMeta.tvdbId) params.set('tvdb', playbackMeta.tvdbId);
      if (playbackMeta.posterUrl) params.set('posterUrl', playbackMeta.posterUrl);

      if (playbackMeta.mediaType === 'episode') {
        params.set('seasonNumber', String(playbackMeta.seasonNumber || 1));
        params.set('episodeNumber', String(playbackMeta.episodeNumber || 1));
        params.set('seriesId', playbackMeta.itemId || '');
        params.set('seriesName', playbackMeta.seriesTitle || playbackMeta.title || '');
        if (playbackMeta.episodeName) params.set('episodeName', playbackMeta.episodeName);
      } else {
        params.set('movieName', playbackMeta.title || '');
      }

      return apiCall(`/video/hls/start?${params.toString()}`);
    }

    function renderLoading(message, error) {
      const host = document.getElementById('videoHost');
      host.className = '';
      // Show a spinner while loading; suppress it on error states.
      const spinner = error ? '' : '<div class="spinner" role="status" aria-label="Loading"></div>';
      host.innerHTML = `<div class="empty ${error ? 'status error' : ''}">${spinner}<span>${escapeHtml(message)}</span></div>`;
    }

    function renderPlayerShell() {
      const host = document.getElementById('videoHost');
      const isLive = !!playbackMeta.isLive;
      host.className = isLive ? 'is-live' : '';
      host.innerHTML = `
        <div class="video-frame">
          <!-- The autoplay attribute is load-bearing: a tap-initiated same-origin
               navigation (the /watch handoff) grants this page autoplay permission,
               and the native attribute is what consumes it — programmatic play()
               from canplay is blocked on mobile Chrome and may never even buffer
               far enough to fire canplay without it. Mirrors the admin player. -->
          <video id="webPlayer" playsinline webkit-playsinline autoplay controlsList="nodownload noplaybackrate noremoteplayback nofullscreen"></video>
          <div id="subtitleOverlay" class="subtitle-overlay"></div>
          ${isLive ? '' : `<div class="pause-overlay" aria-hidden="true">
            <div class="pause-chip">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
            </div>
          </div>`}
        </div>
        <button class="btn icon-btn player-back nav-back mobile-only" onclick="goBackToWatch()" aria-label="Back to details" title="Back to details">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></span>
        </button>
        <div class="controls">
          <button class="btn icon-btn nav-back desktop-only" onclick="goBackToWatch()" aria-label="Back to details" title="Back to details">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg></span>
          </button>
          ${isLive ? '' : `<button class="btn icon-btn" onclick="skipWebPlayer(-30)" aria-label="Skip back 30 seconds" title="Skip back 30 seconds">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg></span>
          </button>`}
          ${isLive ? '' : `<button id="playButton" class="btn icon-btn play-btn" onclick="togglePlayback()" aria-label="Play" title="Play">
            <span class="icon play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
            <span class="icon pause-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg></span>
          </button>`}
          ${isLive ? '' : `<button class="btn icon-btn" onclick="skipWebPlayer(30)" aria-label="Skip forward 30 seconds" title="Skip forward 30 seconds">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg></span>
          </button>`}
          <button id="muteButton" class="btn icon-btn" onclick="toggleMute()" aria-label="Mute" title="Mute">
            <span id="volumeIcon" class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg></span>
          </button>
          <input id="volumeSlider" class="volume-slider desktop-only" type="range" min="0" max="1" step="0.05" value="1" oninput="setWebPlayerVolume(this.value)" aria-label="Volume" title="Volume">
          ${isLive ? '' : `<button class="btn icon-btn tracks-btn" onclick="openTrackSheet()" aria-label="Audio & subtitles" title="Audio & subtitles">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 15h4"/><path d="M14 15h3"/><path d="M7 11h2"/><path d="M12 11h5"/></svg></span>
          </button>`}
          ${(isLive || SHARE_MODE) ? '' : `<button class="btn icon-btn share-btn" onclick="openShareDialog()" aria-label="Share stream" title="Share stream">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg></span>
          </button>`}
          <button class="btn icon-btn desktop-only" onclick="toggleFullscreen()" aria-label="Fullscreen" title="Fullscreen">
            <span class="icon fullscreen-enter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></span>
            <span class="icon fullscreen-exit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg></span>
          </button>
          ${isLive ? `<div class="seek-spacer"></div>
          <div id="time" class="time live-indicator"><span class="live-dot"></span>LIVE</div>` : `<input id="seek" class="seek" type="range" min="0" max="${Math.max(1, Math.floor(hlsDuration || 1))}" step="1" value="${Math.floor(hlsPlaybackOffset)}" onpointerdown="beginSeekInput()" onmousedown="beginSeekInput()" ontouchstart="beginSeekInput()" onkeydown="beginSeekInput()" oninput="previewSeek(this.value)" onchange="commitSeek(this.value)" onblur="cancelSeekInput()">
          <div id="time" class="time">${formatTime(hlsPlaybackOffset)} / ${formatDurationLabel(hlsDuration)}</div>`}
        </div>
        ${isLive ? '' : `<div class="track-backdrop" onclick="closeTrackSheet()" aria-hidden="true"></div>
        <div class="track-controls" role="dialog" aria-modal="true" aria-label="Audio and subtitles">
          <div class="track-sheet-header">
            <span>Audio &amp; Subtitles</span>
            <button class="btn icon-btn" onclick="closeTrackSheet()" aria-label="Close" title="Close">
              <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span>
            </button>
          </div>
          ${renderTrackSelectors()}
        </div>`}
        <div id="status" class="status"></div>
      `;

      const video = document.getElementById('webPlayer');
      video.volume = webPlayerVolume;
      video.muted = webPlayerMuted;
      if (!isLive) video.addEventListener('click', togglePlayback);
      installVideoEvents(video);
      installControlsAutoHide(host);

      // On mobile the immersive (fullscreen) view is the default and only layout.
      // Apply the CSS fill directly — the real Fullscreen API needs a user gesture,
      // and the class alone gives an edge-to-edge player.
      if (isMobileViewport()) {
        host.classList.add('is-fullscreen');
        document.body.style.overflow = 'hidden';
      }

      updateControls();
    }

    function isMobileViewport() {
      return typeof window.matchMedia === 'function' && window.matchMedia('(max-width: 760px)').matches;
    }

    function renderTrackSelectors() {
      const audioOptions = webPlayerAudioStreams.map((stream) => {
        const index = Number(stream.index);
        const selected = Number(webPlayerSelectedAudioTrack) === index ? ' selected' : '';
        return `<option value="${index}"${selected}>${escapeHtml(formatTrackLabel(stream, 'Audio'))}</option>`;
      }).join('');
      const subtitleOptions = [
        `<option value="-1"${Number(webPlayerSelectedSubtitleTrack) < 0 ? ' selected' : ''}>Subtitles Off</option>`,
        ...webPlayerSubtitleStreams.map((stream) => {
          const index = Number(stream.index);
          const selected = Number(webPlayerSelectedSubtitleTrack) === index ? ' selected' : '';
          return `<option value="${index}"${selected}>${escapeHtml(formatTrackLabel(stream, 'Subtitles'))}</option>`;
        }),
      ].join('');

      return `
        <label>Audio
          <select class="select" onchange="changeAudioTrack(this.value)" ${audioOptions ? '' : 'disabled'}>
            ${audioOptions || '<option>No audio tracks</option>'}
          </select>
        </label>
        <label>Subtitles
          <select class="select" onchange="changeSubtitleTrack(this.value)" ${webPlayerSubtitleStreams.length ? '' : 'disabled'}>
            ${subtitleOptions}
          </select>
        </label>
      `;
    }

    function attachWebPlayer(video, playlistUrl) {
      if (!video || !playlistUrl) return;
      webPlayerDebugLog('info', 'attach player', {
        hlsSessionId,
        isLive: Boolean(playbackMeta.isLive),
        canNativeHls: video.canPlayType('application/vnd.apple.mpegurl'),
        hasHlsJs: Boolean(window.Hls),
        hlsJsSupported: Boolean(window.Hls && window.Hls.isSupported()),
        playlistUrl: redactUrlForLog(playlistUrl),
      });
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }

      if (window.Hls && window.Hls.isSupported()) {
        hlsInstance = new Hls({ lowLatencyMode: false, startPosition: 0, backBufferLength: 30 });
        webPlayerMediaRecoverAttempts = 0;
        hlsInstance.loadSource(playlistUrl);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_LOADING, (_event, data) => {
          webPlayerDebugLog('info', 'hls manifest loading', { url: redactUrlForLog(data?.url || '') });
        });
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, (_event, data) => {
          webPlayerDebugLog('info', 'hls manifest parsed', {
            levels: data?.levels?.length,
            audioTracks: data?.audioTracks?.length,
            subtitleTracks: data?.subtitleTracks?.length,
          });
        });
        hlsInstance.on(Hls.Events.LEVEL_LOADED, (_event, data) => {
          webPlayerDebugLog('info', 'hls level loaded', {
            live: Boolean(data?.details?.live),
            fragments: data?.details?.fragments?.length,
            targetduration: data?.details?.targetduration,
            startSN: data?.details?.startSN,
            endSN: data?.details?.endSN,
          });
        });
        hlsInstance.on(Hls.Events.FRAG_LOADING, (_event, data) => {
          const frag = data?.frag;
          webPlayerDebugLog('info', 'hls fragment loading', {
            sn: frag?.sn,
            type: frag?.type,
            url: redactUrlForLog(frag?.url || ''),
          });
        });
        // Once we're successfully buffering again, forget prior recovery attempts
        // so an isolated later blip doesn't immediately exhaust the budget.
        hlsInstance.on(Hls.Events.FRAG_BUFFERED, () => {
          webPlayerMediaRecoverAttempts = 0;
        });
        hlsInstance.on(Hls.Events.ERROR, (_event, data) => {
          webPlayerDebugLog(data?.fatal ? 'error' : 'warn', 'hls error', {
            type: data?.type,
            details: data?.details,
            fatal: Boolean(data?.fatal),
            reason: data?.reason,
            responseCode: data?.response?.code,
            responseText: data?.response?.text,
            fragSn: data?.frag?.sn,
            fragType: data?.frag?.type,
            fragUrl: redactUrlForLog(data?.frag?.url || ''),
            url: redactUrlForLog(data?.url || ''),
            mediaErrorCode: video.error?.code || null,
            mediaErrorMessage: video.error?.message || '',
            readyState: video.readyState,
            networkState: video.networkState,
            currentTime: Number(video.currentTime || 0),
          });
          if (!data?.fatal) return;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            setStatus('Reconnecting…', true);
            hlsInstance.startLoad();
            return;
          }
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            // DEMUXER_ERROR_COULD_NOT_PARSE et al. surface here. hls.js's
            // recommended escalation: recover, then swap the audio codec, then
            // give up. swapAudioCodec resolves the common "can't parse" cases
            // caused by an AAC/MP3 mismatch in the remuxed fMP4.
            webPlayerMediaRecoverAttempts += 1;
            if (webPlayerMediaRecoverAttempts === 1) {
              setStatus('Recovering playback…', true);
              hlsInstance.recoverMediaError();
            } else if (webPlayerMediaRecoverAttempts === 2) {
              setStatus('Recovering playback…', true);
              hlsInstance.swapAudioCodec();
              hlsInstance.recoverMediaError();
            } else {
              setStatus('Playback error. Try switching channel or track.', true);
            }
            return;
          }
          setStatus('Playback error. Try seeking or switching tracks.', true);
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        webPlayerDebugLog('info', 'using native hls fallback', {
          hlsSessionId,
          canNativeHls: video.canPlayType('application/vnd.apple.mpegurl'),
        });
        video.src = playlistUrl;
      } else {
        video.src = playlistUrl;
      }

      video.addEventListener('canplay', () => {
        webPlayerDebugLog('info', 'video canplay', {
          hlsSessionId,
          readyState: video.readyState,
          networkState: video.networkState,
          currentTime: Number(video.currentTime || 0),
        });
        attemptAutoplay(video);
        installSubtitleTrack(video);
      }, { once: true });
    }

    function attemptAutoplay(video) {
      if (!video) return;
      const result = video.play();
      if (!result || typeof result.catch !== 'function') return;
      result.catch(() => {
        // Unmuted autoplay is blocked by mobile browsers after a page
        // navigation (the originating tap's activation doesn't carry over).
        // Fall back to muted autoplay so playback starts immediately, and
        // restore sound on the user's first interaction with the page.
        webPlayerMuted = true;
        video.muted = true;
        armAutoUnmuteOnGesture();
        updateControls();
        const retry = video.play();
        if (retry && typeof retry.catch === 'function') retry.catch(() => {});
      });
    }

    // When autoplay had to fall back to muted, the first real user gesture on
    // the page carries the activation needed to bring sound back — unmute then.
    // Taps on the mute button are excluded so it keeps its normal toggle
    // semantics, and any manual mute toggle disarms this.
    function armAutoUnmuteOnGesture() {
      if (webPlayerAutoMutedPendingGesture) return;
      webPlayerAutoMutedPendingGesture = true;
      const unmute = (event) => {
        document.removeEventListener('pointerdown', unmute, true);
        document.removeEventListener('keydown', unmute, true);
        if (!webPlayerAutoMutedPendingGesture) return;
        webPlayerAutoMutedPendingGesture = false;
        if (event?.target?.closest?.('#muteButton')) return;
        const video = document.getElementById('webPlayer');
        if (!video) return;
        webPlayerMuted = false;
        if (webPlayerVolume <= 0) webPlayerVolume = 1;
        video.volume = webPlayerVolume;
        video.muted = false;
        updateControls();
      };
      document.addEventListener('pointerdown', unmute, true);
      document.addEventListener('keydown', unmute, true);
    }

    function installVideoEvents(video) {
      video.addEventListener('timeupdate', () => {
        if (!webPlayerSeekInProgress && !video.seeking) {
          updateControls();
          renderSubtitles();
          sendWebPlayerProgress();
        }
      });
      video.addEventListener('play', () => {
        updateControls();
        renderSubtitles();
        showControls();
        sendWebPlayerProgress({ force: true, isPaused: false });
      });
      video.addEventListener('pause', () => {
        updateControls();
        renderSubtitles();
        showControls();
        sendWebPlayerProgress({ force: true, isPaused: true });
      });
      video.addEventListener('ended', () => {
        updateControls();
        renderSubtitles();
        sendWebPlayerProgress({ force: true, isPaused: true, ended: true });
      });
      // Buffering/stall detection: surface a live "Buffering" state to the
      // admin dashboard. 'waiting'/'stalled' fire when the player runs dry;
      // 'playing'/'canplay' fire once data resumes.
      const markBuffering = () => {
        if (video.paused || webPlayerBuffering) return;
        webPlayerBuffering = true;
        sendWebPlayerProgress({ force: true });
      };
      const clearBuffering = () => {
        if (!webPlayerBuffering) return;
        webPlayerBuffering = false;
        sendWebPlayerProgress({ force: true });
      };
      video.addEventListener('waiting', markBuffering);
      video.addEventListener('stalled', markBuffering);
      video.addEventListener('playing', clearBuffering);
      video.addEventListener('canplay', clearBuffering);
      video.addEventListener('volumechange', () => {
        webPlayerVolume = Number(video.volume || 0);
        webPlayerMuted = Boolean(video.muted);
        updateControls();
      });
      video.addEventListener('error', () => {
        const message = video.error?.message || 'Video playback failed.';
        setStatus(message, true);
      });
      video.addEventListener('seeked', renderSubtitles);
      video.addEventListener('loadedmetadata', renderSubtitles);
    }

    async function seekWebPlayer(target) {
      const video = document.getElementById('webPlayer');
      if (!video) return;
      const absoluteTarget = clampSeekTarget(target);
      if (!Number.isFinite(absoluteTarget)) return;

      if (!hlsSessionId) {
        video.currentTime = absoluteTarget;
        webPlayerDisplayedSeekTarget = null;
        updateControls();
        return;
      }
      if (webPlayerSeekInProgress) {
        webPlayerQueuedSeekTarget = absoluteTarget;
        webPlayerDisplayedSeekTarget = absoluteTarget;
        updateControls();
        return;
      }

      webPlayerSeekInProgress = true;
      webPlayerDisplayedSeekTarget = absoluteTarget;
      setStatus(`Seeking to ${formatTime(absoluteTarget)}...`);
      const wasPlaying = !video.paused;
      // Only auto-resume the re-attached stream if it was playing — the autoplay
      // attribute must not force playback after a paused seek.
      video.autoplay = wasPlaying;
      video.pause();

      try {
        const response = await apiCall(`/video/hls/${encodeURIComponent(hlsSessionId)}/seek?time=${absoluteTarget.toFixed(2)}`, { method: 'POST' });
        if (!response?.playlistUrl) throw new Error('seek response missing playlist URL');
        const requestedOffset = Number(response.startOffset ?? absoluteTarget);
        const actualOffset = Number(response.actualStartOffset ?? requestedOffset);
        syncSubtitleOffset(requestedOffset, actualOffset);
        hlsDuration = Number(response.duration || hlsDuration || 0);
        rememberPositivePosition(hlsPlaybackOffset);
        webPlayerSubtitleCues = [];
        attachWebPlayer(video, apiUrl(response.playlistUrl));
        sendWebPlayerProgress({ force: true, isPaused: !wasPlaying, position: hlsPlaybackOffset });
        video.addEventListener('canplay', () => {
          setStatus('');
          if (wasPlaying) video.play().catch(() => {});
        }, { once: true });
      } catch (error) {
        setStatus(`Seek failed: ${error.message || String(error)}`, true);
      } finally {
        window.setTimeout(() => {
          webPlayerSeekInProgress = false;
          const queued = webPlayerQueuedSeekTarget;
          webPlayerQueuedSeekTarget = null;
          webPlayerDisplayedSeekTarget = null;
          updateControls();
          // Guard against Number(null) === 0 — an empty queue must not replay a seek to 0.
          const queuedTarget = queued === null || queued === undefined ? Number.NaN : Number(queued);
          if (Number.isFinite(queuedTarget) && Math.abs(queuedTarget - absoluteTarget) >= 0.5) {
            seekWebPlayer(queuedTarget);
          }
        }, 500);
      }
    }

    function currentAbsoluteTime() {
      const video = document.getElementById('webPlayer');
      const position = hlsSessionId
        ? hlsPlaybackOffset + Number(video?.currentTime || 0)
        : Number(video?.currentTime || 0);
      rememberPositivePosition(position);
      return position;
    }

    function rememberPositivePosition(position) {
      const value = Number(position);
      if (Number.isFinite(value) && value > 0) {
        lastKnownPositivePosition = value;
      }
    }

    function progressPositionForSend(options = {}) {
      if (playbackMeta.isLive) {
        if (liveWatchStartedAt === null) liveWatchStartedAt = Date.now();
        return Math.max(1, (Date.now() - liveWatchStartedAt) / 1000);
      }
      if (options.position !== null && options.position !== undefined && Number.isFinite(Number(options.position))) {
        const explicit = Number(options.position);
        rememberPositivePosition(explicit);
        return explicit;
      }
      const position = currentAbsoluteTime();
      if (position > 0) return position;
      if (options.force && lastKnownPositivePosition > 0) return lastKnownPositivePosition;
      return position;
    }

    function currentDuration() {
      if (playbackMeta.isLive) {
        const elapsed = progressPositionForSend();
        return elapsed + 24 * 60 * 60;
      }
      const video = document.getElementById('webPlayer');
      if (Number.isFinite(Number(hlsDuration)) && Number(hlsDuration) > 0) return Number(hlsDuration);
      const mediaDuration = Number(video?.duration);
      if (Number.isFinite(mediaDuration) && mediaDuration > 0) {
        return mediaDuration + (hlsSessionId ? hlsPlaybackOffset : 0);
      }
      return 0;
    }

    function currentControlTime() {
      // Guard against Number(null) === 0 — only honor an explicitly set target.
      if (webPlayerDisplayedSeekTarget === null || webPlayerDisplayedSeekTarget === undefined) {
        return currentAbsoluteTime();
      }
      const displayed = Number(webPlayerDisplayedSeekTarget);
      return Number.isFinite(displayed) ? displayed : currentAbsoluteTime();
    }

    function clampSeekTarget(value) {
      const target = Number(value);
      if (!Number.isFinite(target)) return Number.NaN;
      const duration = currentDuration();
      return duration > 0 ? Math.max(0, Math.min(target, duration)) : Math.max(0, target);
    }

    function skipWebPlayer(delta) {
      seekWebPlayer(clampSeekTarget(currentControlTime() + Number(delta || 0)));
    }

    function beginSeekInput() {
      webPlayerSeekInputActive = true;
      const seek = document.getElementById('seek');
      const target = Number(seek?.value ?? currentControlTime());
      if (Number.isFinite(target)) webPlayerDisplayedSeekTarget = target;
    }

    function previewSeek(value) {
      webPlayerSeekInputActive = true;
      const target = Number(value || 0);
      if (Number.isFinite(target)) {
        webPlayerDisplayedSeekTarget = target;
      }
      updateControls();
    }

    function commitSeek(value) {
      webPlayerSeekInputActive = false;
      seekWebPlayer(Number(value || 0));
    }

    function cancelSeekInput() {
      if (!webPlayerSeekInputActive) return;
      webPlayerSeekInputActive = false;
      webPlayerDisplayedSeekTarget = null;
      updateControls();
    }

    function updateControls() {
      const host = document.getElementById('videoHost');
      const video = document.getElementById('webPlayer');
      const playButton = document.getElementById('playButton');
      const seek = document.getElementById('seek');
      const time = document.getElementById('time');
      const volumeIcon = document.getElementById('volumeIcon');
      if (!video || !host) return;

      const playing = !video.paused;
      host.classList.toggle('is-paused', !playbackMeta.isLive && !playing);
      if (playButton) {
        playButton.classList.toggle('is-playing', playing);
        playButton.setAttribute('aria-label', playing ? 'Pause' : 'Play');
        playButton.setAttribute('title', playing ? 'Pause' : 'Play');
      }

      const duration = currentDuration();
      const controlTime = currentControlTime();
      if (seek && !webPlayerSeekInputActive) {
        seek.disabled = webPlayerSeekInProgress || duration <= 0;
        seek.max = String(Math.max(1, Math.floor(duration || 1)));
        seek.value = String(Math.floor(Math.min(controlTime, duration || controlTime)));
      }
      // Live playback shows a static "LIVE" badge in #time — don't overwrite it.
      if (time && !playbackMeta.isLive) time.textContent = `${formatTime(controlTime)} / ${formatDurationLabel(duration)}`;
      const volumeSlider = document.getElementById('volumeSlider');
      if (volumeSlider && document.activeElement !== volumeSlider) {
        volumeSlider.value = String(video.muted ? 0 : Number(video.volume || 0));
      }
      if (volumeIcon) {
        volumeIcon.innerHTML = video.muted || Number(video.volume || 0) === 0
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="17" y1="9" x2="22" y2="14"/><line x1="22" y1="9" x2="17" y2="14"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>';
      }
    }

    function togglePlayback() {
      const video = document.getElementById('webPlayer');
      if (!video) return;
      if (playbackMeta.isLive) return;
      if (video.paused) video.play().catch(() => {});
      else video.pause();
      updateControls();
    }

    function toggleMute() {
      const video = document.getElementById('webPlayer');
      if (!video) return;
      webPlayerAutoMutedPendingGesture = false;
      webPlayerMuted = !webPlayerMuted;
      if (!webPlayerMuted && webPlayerVolume <= 0) webPlayerVolume = 0.5;
      video.volume = webPlayerVolume;
      video.muted = webPlayerMuted;
      updateControls();
    }

    function setWebPlayerVolume(value) {
      const video = document.getElementById('webPlayer');
      if (!video) return;
      const vol = Math.max(0, Math.min(1, Number(value) || 0));
      webPlayerVolume = vol;
      webPlayerAutoMutedPendingGesture = false;
      webPlayerMuted = vol <= 0;
      video.volume = vol;
      video.muted = webPlayerMuted;
      updateControls();
      showControls();
    }

    function openTrackSheet() {
      const host = document.getElementById('videoHost');
      if (!host) return;
      host.classList.add('tracks-open');
      showControls();
    }

    function closeTrackSheet() {
      const host = document.getElementById('videoHost');
      if (host) host.classList.remove('tracks-open');
    }

    function toggleTheater() {
      const host = document.getElementById('videoHost');
      setTheater(!host?.classList.contains('is-theater'));
    }

    function setTheater(enabled) {
      const host = document.getElementById('videoHost');
      if (!host) return;
      host.classList.toggle('is-theater', Boolean(enabled));
      document.body.style.overflow = enabled ? 'hidden' : '';
      showControls();
    }

    function toggleFullscreen() {
      const host = document.getElementById('videoHost');
      setFullscreen(!host?.classList.contains('is-fullscreen'));
    }

    function setFullscreen(enabled) {
      const host = document.getElementById('videoHost');
      if (!host) return;
      host.classList.toggle('is-fullscreen', Boolean(enabled));
      document.body.style.overflow = enabled ? 'hidden' : '';
      if (enabled) {
        const request = host.requestFullscreen || host.webkitRequestFullscreen;
        if (request) {
          try {
            const result = request.call(host);
            if (result?.catch) result.catch(() => {});
          } catch {}
        }
      } else if (document.fullscreenElement || document.webkitFullscreenElement) {
        const exit = document.exitFullscreen || document.webkitExitFullscreen;
        if (exit) {
          try {
            const result = exit.call(document);
            if (result?.catch) result.catch(() => {});
          } catch {}
        }
      }
      showControls();
    }

    function installControlsAutoHide(host) {
      const wake = () => showControls();
      host.addEventListener('mousemove', wake);
      host.addEventListener('touchstart', wake, { passive: true });
      host.addEventListener('click', wake);
      showControls();
    }

    function showControls() {
      const host = document.getElementById('videoHost');
      if (!host) return;
      host.classList.remove('controls-hidden');
      if (webPlayerControlsHideTimer) clearTimeout(webPlayerControlsHideTimer);
      webPlayerControlsHideTimer = window.setTimeout(() => {
        const video = document.getElementById('webPlayer');
        if (!host.classList.contains('tracks-open') && video && !video.paused) {
          host.classList.add('controls-hidden');
        }
      }, 3000);
    }

    function changeAudioTrack(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed) || parsed === Number(webPlayerSelectedAudioTrack)) return;
      webPlayerSelectedAudioTrack = parsed;
      startWebPlayerFromSource({ startOffset: currentAbsoluteTime() });
    }

    function changeSubtitleTrack(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed) || parsed === Number(webPlayerSelectedSubtitleTrack)) return;
      webPlayerSelectedSubtitleTrack = parsed;
      startWebPlayerFromSource({ startOffset: currentAbsoluteTime() });
    }

    async function installSubtitleTrack(video, options = {}) {
      const loadToken = ++webPlayerSubtitleLoadToken;
      if (!options.silent) {
        webPlayerSubtitleCues = [];
        renderSubtitles();
      }
      if (!hlsSessionId || Number(webPlayerSelectedSubtitleTrack) < 0) {
        clearSubtitleRefresh();
        return;
      }
      try {
        const response = await fetch(apiUrl(`/video/hls/${encodeURIComponent(hlsSessionId)}/subtitles-${encodeURIComponent(String(webPlayerSelectedSubtitleTrack))}.vtt?reload=${Date.now()}`), {
          credentials: 'same-origin',
          cache: 'no-store',
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        if (loadToken !== webPlayerSubtitleLoadToken) return;
        const subtitleExtracting = response.headers.get('X-Subtitle-Extracting') === 'true';
        const subtitleSynced = response.headers.get('X-Subtitle-Synced') === 'true';
        const parsedCues = parseWebVttCues(text);
        if (subtitleSynced) {
          const basis = inferSyncedSubtitleBasis(parsedCues);
          webPlayerSubtitleStartOffset = basis === 'absolute' ? 0 : Number(hlsPlaybackOffset);
          recomputeSubtitleTimeOffset();
          if (typeof webPlayerDebug === 'function') {
            webPlayerDebug('subtitleOffset.syncedBasis', {
              basis,
              firstCueStart: parsedCues[0]?.start ?? null,
              playbackOffset: hlsPlaybackOffset,
              subtitleStartOffset: webPlayerSubtitleStartOffset,
              subtitleTimeOffset: webPlayerSubtitleTimeOffset,
            });
          }
        } else {
          const subtitleStartHeader = Number(response.headers.get('X-Subtitle-Start-Offset'));
          if (Number.isFinite(subtitleStartHeader)) {
            const subtitleStart = Math.max(0, subtitleStartHeader);
            const cueCount = (text.match(/-->/g) || []).length;
            const looksLikePlaceholderStart = hlsPlaybackOffset > 5 && subtitleStart <= 0.05 && cueCount < 2;
            if (!looksLikePlaceholderStart) {
              const keyframeAlignedStart =
                Math.abs(subtitleStart - webPlayerActualStartOffset) < 0.25 &&
                Math.abs(webPlayerActualStartOffset - hlsPlaybackOffset) >= 0.05;
              webPlayerSubtitleStartOffset = keyframeAlignedStart ? hlsPlaybackOffset : subtitleStart;
              recomputeSubtitleTimeOffset();
            }
          }
        }
        webPlayerSubtitleCues = parsedCues;
        renderSubtitles();
        scheduleSubtitleRefresh(video, subtitleExtracting ? 500 : undefined);
      } catch (error) {
        console.warn('Subtitle load failed:', error);
        if (!options.silent) {
          webPlayerSubtitleCues = [];
          renderSubtitles();
        }
        scheduleSubtitleRefresh(video);
      }
    }

    function inferSyncedSubtitleBasis(cues) {
      const firstCueStart = Number(cues?.[0]?.start);
      const playbackOffset = Number(hlsPlaybackOffset);
      if (!Number.isFinite(firstCueStart) || !Number.isFinite(playbackOffset) || playbackOffset < 30) {
        return 'zero';
      }
      return firstCueStart >= Math.max(0, playbackOffset - 5) ? 'absolute' : 'zero';
    }

    function clearSubtitleRefresh() {
      if (webPlayerSubtitleRefreshTimer) clearTimeout(webPlayerSubtitleRefreshTimer);
      webPlayerSubtitleRefreshTimer = null;
    }

    function scheduleSubtitleRefresh(video, delayMs) {
      clearSubtitleRefresh();
      if (!video || !hlsSessionId || Number(webPlayerSelectedSubtitleTrack) < 0) return;
      const delay = Number.isFinite(Number(delayMs)) ? Math.max(250, Number(delayMs)) : 5000;
      webPlayerSubtitleRefreshTimer = window.setTimeout(() => installSubtitleTrack(video, { silent: true }), delay);
    }

    function syncSubtitleOffset(requestedOffset, actualOffset) {
      const requested = Number.isFinite(Number(requestedOffset)) ? Math.max(0, Number(requestedOffset)) : 0;
      const actual = Number.isFinite(Number(actualOffset)) ? Math.max(0, Number(actualOffset)) : requested;
      hlsPlaybackOffset = requested;
      webPlayerActualStartOffset = actual;
      webPlayerSubtitleStartOffset = requested;
      recomputeSubtitleTimeOffset();
    }

    function applyActualStartOffsetCorrection(data) {
      if (!data || webPlayerSeekInProgress) return;
      const actualOffset = Number(data.actualStartOffset);
      if (!Number.isFinite(actualOffset) || actualOffset < 0) return;
      if (Math.abs(actualOffset - webPlayerActualStartOffset) < 0.05) return;
      webPlayerActualStartOffset = actualOffset;
      recomputeSubtitleTimeOffset();
    }

    function recomputeSubtitleTimeOffset() {
      if (!Number.isFinite(Number(hlsPlaybackOffset)) || !Number.isFinite(Number(webPlayerSubtitleStartOffset))) {
        webPlayerSubtitleTimeOffset = 0;
        return;
      }
      const nextOffset = Number(hlsPlaybackOffset) - Number(webPlayerSubtitleStartOffset);
      if (Math.abs(nextOffset - webPlayerSubtitleTimeOffset) < 0.05) return;
      webPlayerSubtitleTimeOffset = nextOffset;
      renderSubtitles();
    }

    function renderSubtitles() {
      const overlay = document.getElementById('subtitleOverlay');
      const video = document.getElementById('webPlayer');
      if (!overlay || !video || Number(webPlayerSelectedSubtitleTrack) < 0) {
        if (overlay) overlay.textContent = '';
        return;
      }
      const time = Number(video.currentTime || 0) + webPlayerSubtitleTimeOffset;
      const active = webPlayerSubtitleCues.filter((cue) => time >= cue.start && time <= cue.end);
      overlay.textContent = active.map((cue) => cue.text).join('\n');
    }

    function parseWebVttCues(text) {
      const cues = [];
      const normalized = String(text || '').replace(/\r/g, '');
      for (const block of normalized.split(/\n{2,}/)) {
        const lines = block.split('\n').map((line) => line.trimEnd()).filter(Boolean);
        if (!lines.length || /^(WEBVTT|NOTE|STYLE|REGION)(\s|$)/i.test(lines[0])) continue;
        const timingIndex = lines.findIndex((line) => line.includes('-->'));
        if (timingIndex < 0) continue;
        const match = lines[timingIndex].match(/^\s*([\d:.]+)\s+-->\s+([\d:.]+)/);
        if (!match) continue;
        const start = parseWebVttTimestamp(match[1]);
        const end = parseWebVttTimestamp(match[2]);
        const cueText = lines.slice(timingIndex + 1).join('\n').replace(/<[^>]+>/g, '').trim();
        if (Number.isFinite(start) && Number.isFinite(end) && end > start && cueText) {
          cues.push({ start, end, text: cueText });
        }
      }
      return cues;
    }

    function parseWebVttTimestamp(value) {
      const parts = String(value || '').split(':');
      if (parts.length < 2 || parts.length > 3) return Number.NaN;
      const seconds = Number(parts.pop());
      const minutes = Number(parts.pop());
      const hours = parts.length ? Number(parts.pop()) : 0;
      if (![hours, minutes, seconds].every(Number.isFinite)) return Number.NaN;
      return (hours * 3600) + (minutes * 60) + seconds;
    }

    function startKeepalive() {
      if (keepaliveTimer) clearInterval(keepaliveTimer);
      keepaliveTimer = setInterval(() => {
        if (!hlsSessionId) return;
        const position = progressPositionForSend({ force: true });
        const query = position > 0 ? `?time=${position.toFixed(2)}` : '';
        fetch(apiUrl(`/video/hls/${encodeURIComponent(hlsSessionId)}/keepalive${query}`), {
          method: 'POST',
          credentials: 'same-origin',
        })
          .then((response) => response.ok ? response.json().catch(() => null) : null)
          .then(applyActualStartOffsetCorrection)
          .catch(() => {});
      }, 20000);
    }

    function startProgressTracking() {
      stopProgressTracking();
      lastProgressSentAt = 0;
      lastProgressPosition = 0;
      liveWatchStartedAt = playbackMeta.isLive ? Date.now() : null;
      lastKnownPositivePosition = playbackMeta.isLive ? 0 : Math.max(0, currentAbsoluteTime());
      lastProgressPaused = false;
      progressCompleted = false;
      progressTimer = setInterval(() => sendWebPlayerProgress(), WEB_PLAYER_PROGRESS_INTERVAL_MS);
    }

    function stopProgressTracking() {
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    function sendWebPlayerProgress(options = {}) {
      // Share-link viewers must not write into the sharer's watch history.
      if (SHARE_MODE) return Promise.resolve(null);
      const video = document.getElementById('webPlayer');
      if (!video || progressCompleted || !activeProfileId) return Promise.resolve(null);
      const duration = currentDuration();
      if (!Number.isFinite(duration) || duration <= 0) return Promise.resolve(null);
      const isEnded = Boolean(options.ended);
      const isPaused = options.isPaused !== undefined ? Boolean(options.isPaused) : Boolean(video.paused);
      const isBuffering = !isPaused && !isEnded && Boolean(webPlayerBuffering);
      let position = isEnded ? duration : progressPositionForSend(options);
      if (!Number.isFinite(position) || position < 0) return Promise.resolve(null);
      position = Math.max(0, Math.min(position, duration));
      if (position <= 0) return Promise.resolve(null);
      rememberPositivePosition(position);

      const now = Date.now();
      const positionDelta = Math.abs(position - lastProgressPosition);
      const pauseStateChanged = isPaused !== lastProgressPaused;
      const bufferStateChanged = isBuffering !== lastProgressBuffering;
      if (!options.force && !pauseStateChanged && !bufferStateChanged && now - lastProgressSentAt < WEB_PLAYER_PROGRESS_INTERVAL_MS && positionDelta < WEB_PLAYER_PROGRESS_MIN_DELTA_SECONDS) {
        return Promise.resolve(null);
      }

      const payload = buildProgressPayload(position, duration, isPaused, isBuffering);
      const endpoint = `/users/${encodeURIComponent(activeProfileId)}/history/progress`;
      const fetchOptions = { method: 'POST', body: JSON.stringify(payload) };
      if (options.keepalive) {
        lastProgressSentAt = Date.now();
        lastProgressPosition = position;
        lastProgressPaused = isPaused;
        lastProgressBuffering = isBuffering;
        return fetch(apiUrl(endpoint), {
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          ...fetchOptions,
          keepalive: true,
        }).catch(() => null);
      }

      return apiCall(endpoint, fetchOptions).then((result) => {
        lastProgressSentAt = Date.now();
        lastProgressPosition = position;
        lastProgressPaused = isPaused;
        lastProgressBuffering = isBuffering;
        const percentWatched = Number(result?.percentWatched ?? (duration > 0 ? (position / duration) * 100 : 0));
        if (!playbackMeta.isLive && (percentWatched >= 90 || isEnded)) {
          progressCompleted = true;
          stopProgressTracking();
        }
        if (result?.allowedToContinue === false) {
          video.pause();
          setStatus('Playback stopped by server policy.');
        }
        return result;
