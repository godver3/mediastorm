{{template "base" .}}

{{define "title"}}Connections - mediastorm Admin{{end}}

{{define "content"}}
<div class="page-header">
    <h1>Service Connections</h1>
    <p>Health check for all configured services</p>
    <button class="btn btn-primary" id="retest-all-btn" onclick="runAllTests()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Retest All
    </button>
</div>

<div id="connections-grid" class="connections-grid"></div>

<style>
.page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.page-header h1 { margin: 0; }
.page-header p { margin: 0; color: var(--text-secondary, #888); flex: 1; }
.connections-grid { display: flex; flex-direction: column; gap: 24px; }
.conn-group h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary, #888); margin: 0 0 12px 0; padding-bottom: 8px; border-bottom: 1px solid var(--border-color, #333); }
.conn-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.conn-card { background: var(--card-bg, #1a1a2e); border: 1px solid var(--border-color, #333); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.2s; }
.conn-card.pass { border-color: var(--success-color, #4caf50); }
.conn-card.fail { border-color: var(--error-color, #f44336); }
.conn-card.unconfigured { border-color: var(--border-color, #333); opacity: 0.6; }
.conn-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.conn-card-name { font-weight: 600; font-size: 14px; }
.conn-card-badges { display: flex; align-items: center; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
.conn-card-badge { display:inline-flex;align-items:center;justify-content:center;min-width:34px;padding:0.125rem 0.45rem;border-radius:999px;font-size:0.68rem;font-weight:700;letter-spacing:0.04em; }
.conn-card-badge-tor { background:rgba(245,158,11,0.16);color:#f59e0b;border:1px solid rgba(245,158,11,0.35); }
.conn-card-badge-dir { background:rgba(34,197,94,0.16);color:#22c55e;border:1px solid rgba(34,197,94,0.35); }
.conn-card-badge-usn { background:rgba(59,130,246,0.16);color:#60a5fa;border:1px solid rgba(96,165,250,0.35); }
.conn-card-badge-meta { background: rgba(99, 102, 241, 0.14); color: var(--accent); border: 1px solid rgba(99, 102, 241, 0.28); }
.conn-card-status { display: flex; align-items: center; gap: 8px; font-size: 13px; min-height: 20px; flex-wrap: wrap; }
.conn-card-status .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.pending { background: var(--text-secondary, #888); }
.dot.testing { background: var(--warning-color, #ff9800); animation: pulse 1s infinite; }
.dot.pass { background: var(--success-color, #4caf50); }
.dot.fail { background: var(--error-color, #f44336); }
.dot.unconfigured { background: var(--text-secondary, #555); }
.conn-card-message { font-size: 12px; color: var(--text-secondary, #888); word-break: break-word; }
.conn-card-time { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>

<script>
let settings = {{json .Settings}};
let testCards = [];

function createCard(group, name, badgeHtml, key, payload) {
    return { group, name, badgeHtml, key, payload, status: 'pending', message: '', durationMs: null };
}

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function createBadge(label, className) {
    return `<span class="conn-card-badge ${className}">${escapeHtml(label)}</span>`;
}

function getStatusLabel(status) {
    if (status === 'pending') return 'Waiting...';
    if (status === 'testing') return 'Testing...';
    if (status === 'pass') return 'Connected';
    if (status === 'unconfigured') return 'Not Configured';
    return 'Failed';
}

function formatDuration(durationMs) {
    if (durationMs == null || Number.isNaN(durationMs)) return '';
    if (durationMs < 1000) return `${Math.round(durationMs)} ms`;
    return `${(durationMs / 1000).toFixed(durationMs >= 10000 ? 0 : 1)} s`;
}

function getScraperBadges(item) {
    const type = String(item?.type || '').toLowerCase();
    if (['aiostreams', 'comet', 'mediafusion'].includes(type)) {
        return createBadge('TOR', 'conn-card-badge-tor') + createBadge('DIR', 'conn-card-badge-dir');
    }
    return createBadge('TOR', 'conn-card-badge-tor');
}

function isConfiguredLiveSource(source) {
    if (!source || source.enabled === false) return false;
    const mode = source.mode || 'm3u';
    if (mode === 'xtream') {
        return !!(source.xtreamHost && source.xtreamUsername && source.xtreamPassword);
    }
    return !!source.playlistUrl;
}

function liveSourceLabel(source, index) {
    const mode = source?.mode === 'xtream' ? 'Xtream Codes' : 'M3U Playlist';
    const name = source?.name || (source?.id ? source.id : '');
    return name ? `${mode}: ${name}` : mode || `Live TV ${index + 1}`;
}

function buildCards() {
    testCards = [];

    testCards.push(createCard('Metadata Services', 'TVDB', createBadge('META', 'conn-card-badge-meta'), 'metadata:tvdb'));
    testCards.push(createCard('Metadata Services', 'TMDB', createBadge('META', 'conn-card-badge-meta'), 'metadata:tmdb'));
    testCards.push(createCard('Metadata Services', 'Gemini', createBadge('META', 'conn-card-badge-meta'), 'metadata:gemini'));

    testCards.push(createCard('Content Services', 'OpenSubtitles', createBadge('META', 'conn-card-badge-meta'), 'subtitles'));
    testCards.push(createCard('Content Services', 'MDBList', createBadge('META', 'conn-card-badge-meta'), 'mdblist'));

    if (settings.live) {
        const liveSources = Array.isArray(settings.live.sources) && settings.live.sources.length
            ? settings.live.sources
            : (Array.isArray(settings.live.playlistSources) ? settings.live.playlistSources : []);
        const configuredLiveSources = liveSources.filter(isConfiguredLiveSource);

        if (configuredLiveSources.length) {
            configuredLiveSources.forEach((source, i) => {
                const mode = source.mode || 'm3u';
                testCards.push(
                    createCard(
                        'Live TV',
                        liveSourceLabel(source, i),
                        createBadge(String(mode || 'live').toUpperCase(), 'conn-card-badge-meta'),
                        `live:${i}`,
                        source
                    )
                );
            });
        } else if (settings.live.mode) {
            testCards.push(
                createCard(
                    'Live TV',
                    settings.live.mode === 'xtream' ? 'Xtream Codes' : 'M3U Playlist',
                    createBadge(String(settings.live.mode || 'live').toUpperCase(), 'conn-card-badge-meta'),
                    'live',
                    settings.live
                )
            );
        }
    }

    if (settings.indexers) {
        settings.indexers.forEach((item, i) => {
            if (item.enabled) {
                testCards.push(
                    createCard(
                        'Usenet Indexers',
                        item.name || ('Indexer ' + (i + 1)),
                        createBadge('USN', 'conn-card-badge-usn'),
                        `indexer:${i}`,
                        item
                    )
                );
            }
        });
    }

    if (settings.torrentScrapers) {
        settings.torrentScrapers.forEach((item, i) => {
            if (item.enabled) {
                testCards.push(
                    createCard(
                        'Torrent & Stream Sources',
                        item.name || ('Scraper ' + (i + 1)),
                        getScraperBadges(item),
                        `scraper:${i}`,
                        item
                    )
                );
            }
        });
    }

    if (settings.usenet) {
        settings.usenet.forEach((item, i) => {
            if (item.enabled) {
                testCards.push(
                    createCard(
                        'Usenet Providers',
                        item.name || ('Provider ' + (i + 1)),
                        createBadge('USN', 'conn-card-badge-usn'),
                        `usenet:${i}`,
                        item
                    )
                );
            }
        });
    }

    if (settings.debridProviders) {
        settings.debridProviders.forEach((item, i) => {
            if (item.enabled) {
                testCards.push(
                    createCard(
                        'Debrid Providers',
                        item.name || ('Provider ' + (i + 1)),
                        createBadge('DIR', 'conn-card-badge-dir'),
                        `debrid:${i}`,
                        item
                    )
                );
            }
        });
    }
}

function renderCards() {
    const grid = document.getElementById('connections-grid');
    const groups = {};
    testCards.forEach((card, i) => {
        if (!groups[card.group]) groups[card.group] = [];
        groups[card.group].push({ ...card, index: i });
    });

    grid.innerHTML = '';
    for (const [groupName, cards] of Object.entries(groups)) {
        const section = document.createElement('div');
        section.className = 'conn-group';
        section.innerHTML = '<h2>' + groupName + '</h2><div class="conn-cards">' +
            cards.map(c => `
                <div class="conn-card ${c.status}" id="conn-card-${c.index}">
                    <div class="conn-card-header">
                        <span class="conn-card-name">${escapeHtml(c.name)}</span>
                        <div class="conn-card-badges">${c.badgeHtml || ''}</div>
                    </div>
                    <div class="conn-card-status">
                        <span class="dot ${c.status}"></span>
                        <span>${getStatusLabel(c.status)}</span>
                        ${c.durationMs != null ? `<span class="conn-card-time">${formatDuration(c.durationMs)}</span>` : ''}
                    </div>
                    ${c.message ? '<div class="conn-card-message">' + escapeHtml(c.message) + '</div>' : ''}
                </div>
            `).join('') +
            '</div>';
        grid.appendChild(section);
    }
}

function updateCard(index, status, message, durationMs) {
    testCards[index].status = status;
    testCards[index].message = message || '';
    testCards[index].durationMs = durationMs ?? null;
    const el = document.getElementById('conn-card-' + index);
    if (!el) return;
    el.className = 'conn-card ' + status;
    const statusEl = el.querySelector('.conn-card-status');
    statusEl.innerHTML = `<span class="dot ${status}"></span><span>${getStatusLabel(status)}</span>${durationMs != null ? `<span class="conn-card-time">${formatDuration(durationMs)}</span>` : ''}`;
    const msgEl = el.querySelector('.conn-card-message');
    if (message) {
        if (msgEl) {
            msgEl.textContent = message;
        } else {
            const m = document.createElement('div');
            m.className = 'conn-card-message';
            m.textContent = message;
            el.appendChild(m);
        }
    } else if (msgEl) {
        msgEl.remove();
    }
}

async function testPost(endpoint, payload) {
    const resp = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    return resp.json();
}

async function runAllTests() {
    const btn = document.getElementById('retest-all-btn');
    btn.disabled = true;

    testCards.forEach((_, i) => updateCard(i, 'testing', '', null));

    const promises = [];

    for (let i = 0; i < testCards.length; i++) {
        const card = testCards[i];
        let p;

        if (card.key && card.key.startsWith('metadata:')) {
            if (!promises._metadataPromise) {
                const startedAt = performance.now();
                promises._metadataPromise = testPost(basePath + '/api/test/metadata', {
                    tvdbApiKey: settings.metadata?.tvdbApiKey || '',
                    tmdbApiKey: settings.metadata?.tmdbApiKey || '',
                    geminiApiKey: settings.metadata?.geminiApiKey || ''
                }).then(result => ({
                    result,
                    durationMs: performance.now() - startedAt,
                }));
            }
            p = promises._metadataPromise.then(({ result, durationMs }) => {
                const providerMap = { 'TVDB': 0, 'TMDB': 1, 'Gemini': 2 };
                const idx = providerMap[card.name];
                if (result.results && result.results[idx]) {
                    const providerResult = result.results[idx];
                    if (providerResult.message === 'Not configured') {
                        return { unconfigured: true, message: providerResult.message, durationMs };
                    }
                    return { ...providerResult, durationMs };
                }
                return { ...result, durationMs };
            });
        } else if (card.key === 'subtitles') {
            p = testPost(basePath + '/api/test/subtitles', {
                username: settings.subtitles?.openSubtitlesUsername || '',
                password: settings.subtitles?.openSubtitlesPassword || ''
            });
        } else if (card.key === 'mdblist') {
            p = testPost(basePath + '/api/test/mdblist', {
                apiKey: settings.mdblist?.apiKey || ''
            });
        } else if (card.key === 'live' || (card.key && card.key.startsWith('live:'))) {
            const source = card.payload || settings.live || {};
            p = testPost(basePath + '/api/test/live', {
                mode: source.mode || settings.live?.mode || '',
                playlistUrl: source.playlistUrl || '',
                xtreamHost: source.xtreamHost || '',
                xtreamUsername: source.xtreamUsername || '',
                xtreamPassword: source.xtreamPassword || ''
            });
        } else if (card.key && card.key.startsWith('indexer:')) {
            const item = card.payload;
            if (item) p = testPost(basePath + '/api/test/indexer', { url: item.url, apiKey: item.apiKey, name: item.name, type: item.type });
        } else if (card.key && card.key.startsWith('scraper:')) {
            const item = card.payload;
            if (item) p = testPost(basePath + '/api/test/scraper', { name: item.name, type: item.type, url: item.url, apiKey: item.apiKey, options: item.options });
        } else if (card.key && card.key.startsWith('usenet:')) {
            const item = card.payload;
            if (item) p = testPost(basePath + '/api/test/usenet-provider', { name: item.name, host: item.host, port: item.port, ssl: item.ssl, username: item.username, password: item.password });
        } else if (card.key && card.key.startsWith('debrid:')) {
            const item = card.payload;
            if (item) p = testPost(basePath + '/api/test/debrid-provider', { name: item.name, provider: item.provider, apiKey: item.apiKey });
        }

        if (p) {
            const cardIndex = i;
            const startedAt = performance.now();
            promises.push(
                p.then(result => {
                    const durationMs = result?.durationMs ?? (performance.now() - startedAt);
                    if (result.unconfigured) {
                        updateCard(cardIndex, 'unconfigured', result.message || 'Not configured', durationMs);
                    } else if (result.success) {
                        updateCard(cardIndex, 'pass', result.message || '', durationMs);
                    } else {
                        updateCard(cardIndex, 'fail', result.error || 'Test failed', durationMs);
                    }
                }).catch(err => {
                    updateCard(cardIndex, 'fail', err.message, performance.now() - startedAt);
                })
            );
        } else {
            updateCard(i, 'unconfigured', 'Not configured', null);
        }
    }

    await Promise.allSettled(promises);
    btn.disabled = false;
}

document.addEventListener('DOMContentLoaded', () => {
    buildCards();
    renderCards();
    runAllTests();
});
</script>
{{end}}
